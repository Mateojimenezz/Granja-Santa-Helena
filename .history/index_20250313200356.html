<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Granja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <link rel="stylesheet" href="./assets/css/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Calistoga&display=swap" rel="stylesheet">

  </head>
<body>
  <header class="header sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
      <div class="logo">
        <img src="./assets/img/logo.png" width="80" alt="Logo">
        <span>La Granja <br> Santa Helena</span>
      </div>
      <nav class="navbar navbar-expand-lg">
        <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#menu" aria-controls="menu" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav ms-auto  gap-4">
            <li class="nav-item"><a class="nav-link" href="#">SOBRE LA GRANJA</a></li>
            <li class="nav-item"><a class="nav-link" href="#">SALÚDANOS</a></li>
            <li class="nav-item"><a class="nav-link" href="#">PRODUCTOS</a></li>
            <li class="nav-item"><a class="nav-link" href="#">CONTÁCTANOS</a></li>
          </ul>
        </div>
      </nav>
      <div class="ingresar "> 
        <i class="bi bi-person-circle fs-3 me-2"></i> <h5 class=" pt-2">Ingresar</h5>
      </div>
    </div>
  </header>
  <main>
    <!-- Sección 1 --> 
    <section class="seccion-1 position-relative">
      <div class="row">
        <div class="col-12">
          <img src="./assets/img/imagen1.jpg" alt="Fotografia de la granja" class="img-fluid imagen1">
          <h1 class="titulo1 position-absolute ">Granja Porcina</h1>
        </div>
      </div>
    </section>
    <!-- Sección 2 -->
    <section class="seccion-2 py-3">
      <div class="container-fluid">
        <div class="row ">
          <div class="col-12 col-lg-4 col-md-4 col-lg-4 ">
            <img src="./assets/img/Upload-5a8315b810a15-13022018 1.png" alt="Imagen 1" class="img-fluid rounded">
          </div>
          <div class="col-12 col-lg-4 col-md-4">
            <img src="./assets/img/Upload-5a8315b810a15-13022018 2.png" alt="Imagen 2" class="img-fluid rounded">
          </div>
          <div class="col-12 col-lg-4 col-md-4">
            <img src="./assets/img/Upload-5a8315b810a15-13022018 3.png" alt="Imagen 3" class="img-fluid rounded">
          </div>
        </div>
      </div>
    </section>
    <!-- Sección 3 --> 
    <section class="seccion-3 py-0">
      <div class="container-fluid">
        <div class="row">
          <!-- Fila de la imagen -->
          <div class="col-12">
            <img src="./assets/img/RESULTADOS-INSEMINACION-ARTIFICIAL 1.png" alt="Cerda recien Parida" class="img-fluid w-100 rounded">
          </div>
        </div>
        <div class="row mt-4 var">
          <!-- Fila del título y el texto -->
          <div class="col-12 text-center">
            <h2 class="mb-3">Título de la sección</h2>
            <p class="text-muted">
              Aquí va el texto descriptivo relacionado con la imagen de arriba. Puedes explicar o destacar algún aspecto importante con este texto.
            </p>
          </div>
        </div>
      </div>
    </section>
    
    
    
  </main>

  <!-- bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
